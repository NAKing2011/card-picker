<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#1c1c1e" />
  <title>Card Claim System</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<header>
  <h1>Card Picker</h1>
  <button type="button" id="cartIcon" class="cart-icon-btn" data-count="0" aria-label="Open shopping cart">🛒</button>
</header>

<div id="cardSectionsContainer"></div>

<div id="cartPanel">
  <div id="closeCart">×</div>
  <h2>Your Cart</h2>
  <div id="cartItems"></div>
  <div id="cartTotal">Total: $0</div>
  <div id="acknowledgments">
    <h4>Made Possible By & Behind the Scenes:</h4>
    <p>
      <strong class="ack-strong">Vikram, Amita, The UPS Store</strong><br />
      Naitik – Website, Selling<br />
      Navya – Selling, Sales Representative<br />
      Aariv – Organizing, Sorting
    </p>
  </div>
</div>

<div id="footerBar">Total: $0 | 0 cards</div>

<div class="page-footer-actions">
  <button type="button" class="btn-export" onclick="exportSoldHistoryToCSV()">Export Sales</button>
</div>

<!-- Order matters: data (catalog) first, then app logic -->
<script src="data.js"></script>
<script src="app.js"></script>

</body>
</html>
