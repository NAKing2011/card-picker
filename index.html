<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Card Claim System</title>
<style>
  body {
    font-family: Arial, sans-serif;
    margin: 0; padding: 0;
    box-sizing: border-box;
    background: #f9f9f9;
  }
  header {
    background: #222;
    color: white;
    padding: 10px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .cart-icon {
    position: relative;
    cursor: pointer;
    font-size: 28px;
  }
  .cart-icon::after {
    content: attr(data-count);
    position: absolute;
    top: -8px;
    right: -12px;
    background: red;
    color: white;
    font-size: 14px;
    width: 22px;
    height: 22px;
    border-radius: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
    font-weight: bold;
  }
  #footerBar {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #333;
    color: white;
    padding: 10px 20px;
    border-radius: 50px;
    font-size: 16px;
    font-weight: bold;
    box-shadow: 0 0 10px rgba(0,0,0,0.3);
    cursor: pointer;
    z-index: 999;
  }
  .card-section {
    padding: 20px;
  }
  .section-title {
    font-size: 24px;
    margin-bottom: 10px;
    font-weight: bold;
  }
  .cards-container {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
  }
  .card {
    width: 140px;
    background: white;
    border-radius: 8px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    padding: 10px;
    text-align: center;
  }
  .card img {
    width: 100%;
    height: 170px;
    object-fit: contain;
    border-radius: 4px;
  }
  .card button {
    margin-top: 8px;
    padding: 6px 12px;
    border: none;
    background: #007bff;
    color: white;
    border-radius: 4px;
    cursor: pointer;
    font-weight: bold;
    transition: background 0.3s ease;
  }
  .card button:disabled {
    background: #aaa;
    cursor: not-allowed;
  }
  /* Cart panel */
  #cartPanel {
    position: fixed;
    top: 0; right: 0;
    width: 320px;
    height: 100vh;
    background: white;
    box-shadow: -3px 0 8px rgba(0,0,0,0.15);
    padding: 20px;
    display: none;
    flex-direction: column;
    z-index: 1000;
  }
  #cartPanel h2 {
    margin-top: 0;
  }
  #closeCart {
    position: absolute;
    top: 15px;
    right: 15px;
    font-size: 26px;
    cursor: pointer;
    user-select: none;
  }
  #cartItems {
    flex-grow: 1;
    overflow-y: auto;
    margin-top: 10px;
  }
  .cart-item {
    display: flex;
    align-items: center;
    margin-bottom: 12px;
    border-bottom: 1px solid #eee;
    padding-bottom: 10px;
  }
  .cart-item img {
    width: 120px;
    height: 120px;
    object-fit: cover;
    border-radius: 4px;
    cursor: pointer;
  }
  .cart-item span {
    flex: 1;
    margin-left: 12px;
    font-weight: bold;
  }
  .remove-btn {
    background: transparent;
    border: none;
    font-size: 22px;
    color: red;
    cursor: pointer;
    padding: 0 6px;
    user-select: none;
  }
  #cartTotal {
    font-weight: bold;
    margin-top: 15px;
    font-size: 18px;
    border-top: 1px solid #ccc;
    padding-top: 12px;
  }
  #acknowledgments {
    margin-top: 25px;
    font-size: 14px;
    color: #555;
  }
  #acknowledgments h4 {
    margin-bottom: 6px;
  }
  .sold-history {
    margin-top: 10px;
    font-size: 13px;
    color: #444;
    font-style: italic;
  }

</style>
</head>
<body>

        { name: 'Blank Option 2', image: 'https://cdn11.bigcommerce.com/s-o3ewkiqyx3/products/1731/images/3712/cd1920-smiley-face-cloud-blank-card__26904.1656196013.386.513.jpg?c=1', remaining: 2 },
        { name: 'Blank Option 3', image: 'https://cdn11.bigcommerce.com/s-o3ewkiqyx3/images/stencil/1280x1280/products/12354/25824/cd20086__55038.1667070888.jpg?c=1', remaining: 3 }

  // Object to track remaining count by key (section-label + card index)
  const remaining = {};
  // The cart array with objects: { cardName, key, image }
  let cart = [];
  let soldHistory = {}; // { "Halloween-0": { name: "Halloween Option 1", sold: 0 } }


  // Elements
  const cardSectionsContainer = document.getElementById('cardSectionsContainer');
  const cartIcon = document.getElementById('cartIcon');
  const cartPanel = document.getElementById('cartPanel');
  const cartItemsDiv = document.getElementById('cartItems');
  const closeCartBtn = document.getElementById('closeCart');
  const footerBar = document.getElementById('footerBar');

  // Initialize cards display
  function initCards() {
    sections.forEach((section, sectionIndex) => {
      const sectionDiv = document.createElement('div');
      sectionDiv.className = 'card-section';

      const title = document.createElement('div');
      title.className = 'section-title';
      title.textContent = section.label;
      sectionDiv.appendChild(title);

      const cardsContainer = document.createElement('div');
      cardsContainer.className = 'cards-container';

      section.cards.forEach((card, cardIndex) => {
        const cardKey = `${section.label}-${cardIndex}`;
        remaining[cardKey] = card.remaining;

        const cardDiv = document.createElement('div');
        cardDiv.className = 'card';

        cardDiv.innerHTML = `
          <img src="${card.image}" alt="${card.name}" />
          <div>${card.name}</div>
          <div>Remaining: <span id="qty-${cardKey}">${remaining[cardKey]}</span></div>
          <button id="btn-${cardKey}">Claim</button>
          <div class="sold-history" id="history-${cardKey}" style="display:none;"></div>
        `;

        // Add button click handler
        const btn = cardDiv.querySelector('button');
        btn.onclick = () => addToCart(card.name, cardKey, card.image, btn);

        // ✅ Disable button right away if stock = 0
        if (remaining[cardKey] === 0) {
          btn.disabled = true;
        }

        cardsContainer.appendChild(cardDiv);
      });

      sectionDiv.appendChild(cardsContainer);
      cardSectionsContainer.appendChild(sectionDiv);
    });
  }


  // Price calculation function (example pricing)
  function calculatePrice(count) {
    if (count <= 0) return 0;
    if (count === 1) return 2;
    if (count === 2) return 3;
    if (count === 3) return 5;
    if (count === 4) return 6;
    if (count === 5) return 8;
    if (count === 6) return 9;
    return 9 + (count - 6);
  }

  // Add card to cart
  function addToCart(cardName, key, image, button) {
    if (remaining[key] <= 0) {
      alert('🐾 No cards left. Sorry! 🙃 🐾');
      return;
    }
    if (!soldHistory[key]) {
      soldHistory[key] = { name: cardName, sold: 0 };
    }
    soldHistory[key].sold++;

    remaining[key]--;
    document.getElementById(`qty-${key}`).innerText = remaining[key];
    if (remaining[key] === 0) button.disabled = true;

    cart.push({ cardName, key, image });
    updateCartDisplay();

    saveRemainingToLocalStorage(); // ✅ Save changes
  }

  function removeFromCart(index, permanentDelete = false) {
    const item = cart[index];

    if (!permanentDelete) {
      // Restore stock
      if (remaining[item.key] !== undefined) {
        remaining[item.key]++;
        const qtySpan = document.getElementById(`qty-${item.key}`);
        if (qtySpan) qtySpan.innerText = remaining[item.key];
        const claimBtn = document.getElementById(`btn-${item.key}`);
        if (claimBtn && remaining[item.key] > 0) claimBtn.disabled = false;
      }

      // Roll back sold history too
      if (soldHistory[item.key]) {
        soldHistory[item.key].sold--;
        if (soldHistory[item.key].sold < 0) soldHistory[item.key].sold = 0; // safety guard
      }
    }

    // Remove from cart
    cart.splice(index, 1);
    updateCartDisplay();

    saveRemainingToLocalStorage(); // ✅ Save changes
  }



  // Update cart UI
  function updateCartDisplay() {
    cartItemsDiv.innerHTML = '';

    cart.forEach((item, index) => {
      const div = document.createElement('div');
      div.className = 'cart-item';

      const img = document.createElement('img');
      img.src = item.image;
      img.alt = item.cardName;

      // Double-click image removes permanently
      img.ondblclick = () => {
        const realIndex = cart.findIndex(c => c === item);
        if (realIndex !== -1) {
          // Reveal or refresh history
          const historyDiv = document.getElementById(`history-${item.key}`);
          if (historyDiv && soldHistory[item.key]) {
            historyDiv.style.display = 'block';
            historyDiv.textContent = `Sold: ${soldHistory[item.key].sold}`;
          }
          removeFromCart(realIndex, true);
        }
      };



      const span = document.createElement('span');
      span.textContent = item.cardName;

      const removeBtn = document.createElement('button');
      removeBtn.className = 'remove-btn';
      removeBtn.textContent = '❌';
      removeBtn.title = "Remove and restore stock";
      removeBtn.onclick = () => removeFromCart(index, false);

      div.appendChild(img);
      div.appendChild(span);
      div.appendChild(removeBtn);

      cartItemsDiv.appendChild(div);
    });

    // Update counters and totals
    const totalPrice = calculatePrice(cart.length);
    cartIcon.setAttribute('data-count', cart.length);
    document.getElementById('cartTotal').innerText = `Total: $${totalPrice}`;
    footerBar.innerText = `Total: $${totalPrice} | ${cart.length} card${cart.length !== 1 ? 's' : ''}`;
  }

  // Toggle cart panel visibility
  function toggleCart() {
    const isVisible = cartPanel.style.display === 'flex';
    cartPanel.style.display = isVisible ? 'none' : 'flex';
    footerBar.style.display = isVisible ? 'block' : 'none';
  }

  // Setup event listeners
  function setup() {
    cartIcon.addEventListener('click', toggleCart);
    closeCartBtn.addEventListener('click', () => {
      cartPanel.style.display = 'none';
      footerBar.style.display = 'block';
    });
  }
  
  function saveRemainingToLocalStorage() {
    localStorage.setItem('remaining', JSON.stringify(remaining));
  }
  function exportSoldHistoryToCSV() {
    // Build header row
    let csvContent = "data:text/csv;charset=utf-8,Item,Sold\n";

    // Add rows from soldHistory
    for (const key in soldHistory) {
      if (soldHistory.hasOwnProperty(key)) {
        const sold = soldHistory[key].sold;
        csvContent += `${key},${sold}\n`;
      }
    }

    // Create a downloadable link
    const encodedUri = encodeURI(csvContent);
    const link = document.createElement("a");
    link.setAttribute("href", encodedUri);
    link.setAttribute("download", "sold_history.csv");
    document.body.appendChild(link);

    link.click(); // Auto-trigger download
    document.body.removeChild(link);
  }


  // Initialize everything
  initCards();
  setup();
  updateCartDisplay();

</script>
